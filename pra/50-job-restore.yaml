apiVersion: batch/v1
kind: Job
metadata:
  name: sqlite-restore-custom
  namespace: pra
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: restore
          image: alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              # ─────────────────────────────────────────────────────────────
              # Point de restauration : remplacer la valeur de TARGET_FILE
              # par le nom du fichier backup souhaité (obtenu via ls /backup).
              # Laisser vide ("") pour restaurer automatiquement le plus récent.
              # ─────────────────────────────────────────────────────────────
              TARGET_FILE=""

              if [ -z "$TARGET_FILE" ]; then
                echo "[INFO] Aucun fichier cible spécifié — restauration du dernier backup."
                TARGET=$(ls -t /backup/*.db | head -1)
              else
                TARGET="/backup/$TARGET_FILE"
              fi

              if [ ! -f "$TARGET" ]; then
                echo "[ERREUR] Fichier introuvable : $TARGET"
                echo "[INFO] Fichiers disponibles dans /backup :"
                ls -lht /backup/
                exit 1
              fi

              echo "[INFO] Restauration depuis : $TARGET"
              cp "$TARGET" /data/app.db
              echo "[OK] Restauration terminée."
          volumeMounts:
            - name: data
              mountPath: /data
            - name: backup
              mountPath: /backup
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pra-data
        - name: backup
          persistentVolumeClaim:
            claimName: pra-backup
